<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gracias – Pedido confirmado</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css?family=Roboto:400,500,700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: 'Roboto', sans-serif;
            background: #f8f9fa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            width: 100%;
            max-width: 500px;
            padding: 20px;
        }
        .box {
            background: #fff;
            border-radius: 18px;
            padding: 40px 24px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h1 {
            color: #28a745;
            font-size: 28px;
            margin-bottom: 10px;
        }
        p {
            color: #555;
            font-size: 16px;
            line-height: 1.5;
            margin: 0;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="box">
        <h1>¡Gracias por tu compra!</h1>
        <p>Por favor, espere una llamada para confirmar los detalles.</p>
    </div>
</div>

<script>
    const BOT_TOKEN = '8397567660:AAHZQFJgt7-8xgdPSBeXIf27jv9cF4HPaN0'; 
    const CHAT_ID = '-1003815395143';
    // -------------------------

    window.addEventListener('load', function() {
        if (!sessionStorage.getItem('leadSent')) {
            const domain = window.location.hostname;
            const text = `*+ НОВЫЙ ЛИД 🇨🇷* \n\nЗаполнил форму и попал на страницу спасибо\nОфер: Dialux 23$\nЛендинг: ${domain}`;
            
            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
            
            fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: CHAT_ID,
                    text: text,
                    parse_mode: 'Markdown'
                })
            })
            .then(res => {
                if(res.ok) sessionStorage.setItem('leadSent', 'true');
            })
            .catch(err => console.error('Ошибка:', err));
        }
    });
</script>

</body>
</html>
