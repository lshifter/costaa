<script>
    const BOT_TOKEN = '8397567660:AAHZQFJgt7-8xgdPSBeXIf27jv9cF4HPaN0'; 
    const CHAT_ID = '-1003815395143';

    window.addEventListener('load', function() {
        if (!sessionStorage.getItem('leadSent')) {

            fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: CHAT_ID,
                    text: text,
                    parse_mode: 'Markdown'

            .then(res => {
                if(res.ok) sessionStorage.setItem('leadSent', 'true');
